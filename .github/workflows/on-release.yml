# See jax-ml/ml_dtypes for origins.
#
# https://github.com/jax-ml/ml_dtypes/blob/main/.github/workflows/wheels.yml

name: Build and publish

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/on-release.yml'
      - 'pyproject.toml'
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build-dist:
    name: Build distributions
    runs-on: 'ubuntu-24.04'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          submodules: true

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          cache: 'pip'
          python-version: 3.12

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build distributions
        run: python -m build -s -w

      - name: Check distributions
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dist
          path: dist/

  upload-github-release-assets:
    name: Upload GitHub Release assets
    needs:
      - build-dist
    runs-on: 'ubuntu-24.04'
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # ratchet:actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload distributions to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  upload-pypi:
    name: Publish distributions to PyPI
    needs:
      - build-dist
      - upload-github-release-assets
    runs-on: 'ubuntu-24.04'
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/mpl-typst
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # ratchet:actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # ratchet:pypa/gh-action-pypi-publish@v1.12.4
